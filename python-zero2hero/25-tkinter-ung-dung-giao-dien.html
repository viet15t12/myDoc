<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="0; url=ComingSoon.html" />
  <link rel="canonical" href="ComingSoon.html" />
  <title>Coming soon</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
      font-family: "Sora", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      color: #f8fafc;
      background:
        radial-gradient(circle at 20% 20%, rgba(250, 204, 21, 0.22), transparent 34%),
        radial-gradient(circle at 80% 0%, rgba(59, 130, 246, 0.22), transparent 32%),
        #020617;
    }
    main {
      width: min(720px, 100%);
      padding: 42px;
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: 18px;
      background: rgba(15, 23, 42, 0.78);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.36);
    }
    .eyebrow {
      margin: 0 0 14px;
      color: #facc15;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0 0 16px;
      font-size: clamp(38px, 8vw, 76px);
      line-height: 0.95;
    }
    p {
      margin: 0;
      max-width: 56ch;
      color: #cbd5e1;
      font-size: 17px;
      line-height: 1.75;
    }
    .status {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      margin-top: 28px;
      padding: 10px 14px;
      border-radius: 999px;
      color: #dbeafe;
      background: rgba(59, 130, 246, 0.14);
      border: 1px solid rgba(147, 197, 253, 0.22);
      font-size: 14px;
      font-weight: 700;
    }
    .dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: #34d399;
      box-shadow: 0 0 0 6px rgba(52, 211, 153, 0.14);
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Python Zero2Hero</p>
    <h1>Coming soon</h1>
    <p>Bai hoc nay dang duoc bien soan. Noi dung sap len san, gon gang hon, de hieu hon, va co vi du thuc chien hon.</p>
    <div class="status"><span class="dot"></span>Dang nau noi dung</div>
  </main>
</body>
</html>
